name: Build minimuxer

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build minimuxer
    if: startsWith(github.event.head_commit.message, '[build]') || github.event_name == 'workflow_dispatch'
    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write
    runs-on: macos-15

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

    - name: Cache rust
      uses: Swatinem/rust-cache@v2

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1.4.1
      with:
        xcode-version: 16.2

    - name: Build
      env:
        IPHONEOS_DEPLOYMENT_TARGET: "17.1"
      run: make zip

    - name: Upload to release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        BODY="Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
        if gh release view build --repo "${{ github.repository }}" > /dev/null 2>&1; then
          gh release edit build \
            --repo "${{ github.repository }}" \
            --title "Build" \
            --notes "$BODY"
          gh release upload build \
            --repo "${{ github.repository }}" \
            --clobber \
            minimuxer.xcframework.zip \
            generated.zip \
            target/libminimuxer-ios.a \
            target/libminimuxer-sim.a
        else
          gh release create build \
            --repo "${{ github.repository }}" \
            --title "Build" \
            --notes "$BODY" \
            minimuxer.xcframework.zip \
            generated.zip \
            target/libminimuxer-ios.a \
            target/libminimuxer-sim.a
        fi
# trigger: RPPairing + set_device_ip release
